name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check battery_rul/ tests/

      - name: Format check (black)
        run: black --check battery_rul/ tests/

      - name: Type check (mypy)
        run: mypy battery_rul/

      - name: Test
        run: pytest tests/ -v
